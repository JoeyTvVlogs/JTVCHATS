<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joey Chat Modern Mobile</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#0f1b26; color:#fff; height:100vh; display:flex; justify-content:center; align-items:center; }

/* LOGIN */
#login { display:none; background:#1c2733; padding:40px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.5); width:90%; max-width:400px; text-align:center; }
#login input { width:100%; padding:12px 15px; margin:10px 0; border-radius:10px; border:none; background:#283645; color:#fff; }
#login button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; background:#00a884; cursor:pointer; font-weight:bold; transition:0.2s; }
#login button:hover { background:#008c6a; }

/* CHAT WRAPPER */
#chat { display:flex; height:90vh; width:95%; max-width:1200px; border-radius:15px; overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,0.6); }

/* SIDEBAR */
.sidebar { width:28%; min-width:220px; background:#1e2a38; display:flex; flex-direction:column; padding:20px 15px; }
.sidebar button { padding:10px 15px; border:none; border-radius:10px; background:#00a884; color:#fff; font-weight:bold; cursor:pointer; margin-bottom:15px; transition:0.2s; }
.sidebar button:hover { background:#008c6a; }
.chat-list { flex:1; overflow-y:auto; }
.chat-list div { background:#283645; padding:12px 15px; border-radius:12px; margin-bottom:10px; cursor:pointer; position:relative; transition:0.2s; }
.chat-list div:hover { background:#3a4a5a; }
.chat-list button { position:absolute; right:10px; top:10px; background:#ff4d4d; color:#fff; font-size:12px; padding:3px 6px; border-radius:6px; }

/* CHAT AREA */
.chat-area { flex:1; display:flex; flex-direction:column; background:#0f1b26; }
header { padding:20px; background:#1e2a38; font-weight:bold; font-size:1.2em; border-bottom:1px solid #283645; }
#messages { flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; background:#0f1b26; }
.message { padding:12px 15px; border-radius:15px; max-width:70%; word-wrap:break-word; transition:0.2s; background:#283645; }
.message.mine { background:#00a884; align-self:flex-end; color:#fff; }
.message img { max-width:200px; border-radius:12px; margin-top:5px; }
.message audio { margin-top:5px; width:100%; }

/* INPUT AREA */
.input { display:flex; gap:10px; padding:15px; border-top:1px solid #283645; background:#1e2a38; }
.input input { flex:1; padding:12px; border-radius:12px; border:none; background:#283645; color:#fff; }
.input button { padding:12px 15px; border-radius:12px; border:none; background:#00a884; cursor:pointer; transition:0.2s; }
.input button:hover { background:#008c6a; }

/* RESPONSIVE & MOBILE */
@media(max-width:768px){
    #chat { flex-direction:column; height:95vh; }
    .sidebar { width:100%; min-width:auto; flex-direction:row; overflow-x:auto; gap:10px; padding:10px; height:60px; align-items:center; }
    .chat-list { display:flex; flex-direction:row; gap:10px; overflow-x:auto; flex:none; height:auto; }
    .chat-list div { min-width:120px; text-align:center; padding:8px 10px; margin-bottom:0; border-radius:10px; }
    .chat-area { flex:1; }
    .input { flex-direction:column; gap:5px; padding:10px; }
    .input input { width:100%; }
    .input button { width:100%; padding:12px; font-size:16px; }
    .message { max-width:90%; font-size:15px; padding:12px 15px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login / Register</button>
</div>

<!-- CHAT -->
<div id="chat">
    <div class="sidebar">
        <button onclick="startChat()">+ Nieuwe chat</button>
        <div id="chatList" class="chat-list"></div>
        <label style="margin-top:10px;"><input type="checkbox" id="notifToggle"> Meldingen aan</label>
    </div>
    <div class="chat-area">
        <header id="chatHeader">Selecteer een chat</header>
        <div id="messages"></div>
        <div class="input">
            <input id="msg" placeholder="Typ bericht...">
            <button id="sendBtn">Send</button>
            <input type="file" accept="image/*;capture=camera" id="photoInput" style="display:none">
            <button id="photoBtn">📷</button>
            <input type="file" accept="audio/*;capture=microphone" id="voiceInput" style="display:none">
            <button id="voiceBtn">🎤</button>
        </div>
    </div>
</div>

<script type="module">
// --- Firebase setup & core logic (zelfde als vorige versie) ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
   apiKey: "AIzaSyBb06Iy099KXsfoBLsMhH0dohlKGQW30-E",
   authDomain: "chat-app-joey.firebaseapp.com",
   databaseURL: "https://chat-app-joey-default-rtdb.europe-west1.firebasedatabase.app/",
   projectId: "chat-app-joey",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const loginDiv=document.getElementById("login"), chatDiv=document.getElementById("chat"), messages=document.getElementById("messages"), chatList=document.getElementById("chatList"), chatHeader=document.getElementById("chatHeader");
const msgInput=document.getElementById("msg"), usernameInput=document.getElementById("username"), passwordInput=document.getElementById("password");
const photoBtn=document.getElementById("photoBtn"), photoInput=document.getElementById("photoInput");
const voiceBtn=document.getElementById("voiceBtn"), voiceInput=document.getElementById("voiceInput");
const sendBtn=document.getElementById("sendBtn"), notifToggle=document.getElementById("notifToggle");

let currentChat=null;
const ownerUsername="JTVNL";
const isOwner=localStorage.getItem("user")?.toLowerCase()===ownerUsername.toLowerCase();
let notifEnabled=false;

if("Notification" in window) Notification.requestPermission();
notifToggle.addEventListener("change",()=>{ notifEnabled=notifToggle.checked; if(notifEnabled && Notification.permission!=="granted") Notification.requestPermission(); });

// --- LOGIN ---
window.login=function(){ const user=usernameInput.value.trim().toLowerCase(); const pass=passwordInput.value; if(!user||!pass) return alert("Vul alles in"); localStorage.setItem("user",user); loginDiv.style.display="none"; chatDiv.style.display="flex"; loadSavedChats(); }

// --- CHAT LOGIC ---
window.startChat=function(){ const otherUser=prompt("Username van persoon:")?.trim().toLowerCase(); if(!otherUser) return; let savedChats=JSON.parse(localStorage.getItem("savedChats")||"[]"); if(!savedChats.includes(otherUser)){ savedChats.push(otherUser); localStorage.setItem("savedChats",JSON.stringify(savedChats)); } openChatWithUser(otherUser); }

function openChatWithUser(otherUser){ const user=localStorage.getItem("user"); const chatId=[user,otherUser].sort().join("_"); currentChat=chatId; chatHeader.innerText="Chat met "+otherUser; messages.innerHTML=""; addChatToList(chatId,otherUser); loadMessages(); }

function addChatToList(chatId,otherUser){ const exists=Array.from(chatList.children).some(c=>c.dataset.user===otherUser); if(exists) return; const div=document.createElement("div"); div.innerText=otherUser; div.dataset.user=otherUser; div.onclick=()=>openChatWithUser(otherUser); if(isOwner && otherUser!==ownerUsername.toLowerCase()){ const kickBtn=document.createElement("button"); kickBtn.innerText="Kick/Ban"; kickBtn.onclick=async e=>{ e.stopPropagation(); push(ref(db,`banned/${currentChat}`),{user:otherUser}); alert(`${otherUser} is gebanned!`); }; div.appendChild(kickBtn); } chatList.appendChild(div); }

function loadSavedChats(){ const savedChats=JSON.parse(localStorage.getItem("savedChats")||"[]"); savedChats.forEach(otherUser=>{ const user=localStorage.getItem("user"); const chatId=[user,otherUser].sort().join("_"); addChatToList(chatId,otherUser); }); }

async function send(){ const user=localStorage.getItem("user"); const bannedSnap=await get(ref(db,`banned/${currentChat}`)); const bannedList=bannedSnap.exists()?Object.values(bannedSnap.val()).map(x=>x.user):[]; if(bannedList.includes(user)){alert("Je bent gebanned!"); return;} const msg=msgInput.value; if(!msg||!currentChat) return; push(ref(db,"chats/"+currentChat),{user,text:msgInput.value}); msgInput.value=""; }
sendBtn.onclick=send;

photoBtn.onclick=()=>photoInput.click();
photoInput.onchange=()=>{ if(!photoInput.files[0]||!currentChat) return; const reader=new FileReader(); reader.onload=()=>push(ref(db,"chats/"+currentChat),{user:localStorage.getItem("user"),image:reader.result}); reader.readAsDataURL(photoInput.files[0]); }

voiceBtn.onclick=()=>voiceInput.click();
voiceInput.onchange=()=>{ if(!voiceInput.files[0]||!currentChat) return; const reader=new FileReader(); reader.onload=()=>push(ref(db,"chats/"+currentChat),{user:localStorage.getItem("user"),audio:reader.result}); reader.readAsDataURL(voiceInput.files[0]); }

function loadMessages(){
    onChildAdded(ref(db,"chats/"+currentChat),data=>{
        const msgData=data.val(); const div=document.createElement("div"); div.className="message"; if(msgData.user===localStorage.getItem("user")) div.classList.add("mine");
        if(msgData.text) div.innerText=msgData.user+": "+msgData.text;
        else if(msgData.image){ const img=document.createElement("img"); img.src=msgData.image; div.innerText=msgData.user+": "; div.appendChild(img); }
        else if(msgData.audio){ const audio=document.createElement("audio"); audio.src=msgData.audio; audio.controls=true; div.innerText=msgData.user+": "; div.appendChild(audio); }
        messages.appendChild(div); messages.scrollTop=messages.scrollHeight;
        if(notifEnabled && msgData.user!==localStorage.getItem("user") && Notification.permission==="granted") new Notification(`Nieuw bericht van ${msgData.user}`,{body:msgData.text||(msgData.image?"📷 Foto":"🎤 Voice message")});
    });
    if(isOwner){ const typingRef=ref(db,`typing/${currentChat}`); onChildAdded(typingRef,data=>console.log(`[OWNER VIEW] ${data.val().text}`)); }
}
msgInput.addEventListener("input",()=>{ if(!currentChat||!isOwner) return; push(ref(db,`typing/${currentChat}`),{owner:ownerUsername,text:msgInput.value,timestamp:Date.now()}); });

// AUTO LOGIN
if(localStorage.getItem("user")){ loginDiv.style.display="none"; chatDiv.style.display="flex"; loadSavedChats(); }
else loginDiv.style.display="block";
</script>
</body>
</html>
