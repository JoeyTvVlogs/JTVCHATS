<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joey Chat</title>
<style>
body { margin:0; font-family:Arial; background:#0b141a; color:white; }
#login { display:none; padding:20px; }
#chat { display:none; height:100vh; }
.container { display:flex; height:100%; }
.sidebar { width:30%; background:#202c33; padding:10px; }
.chat-list div { padding:10px; background:#2a3942; margin:5px 0; cursor:pointer; position:relative; }
.chat-area { flex:1; display:flex; flex-direction:column; }
header { background:#202c33; padding:15px; }
#messages { flex:1; overflow-y:auto; padding:10px; }
.message { margin:5px 0; padding:10px; border-radius:10px; background:#202c33; max-width:60%; }
.mine { background:#005c4b; margin-left:auto; }
.input { display:flex; gap:5px; padding:5px; }
input { flex:1; padding:10px; border:none; border-radius:5px; }
button { padding:10px; background:#00a884; border:none; color:white; cursor:pointer; border-radius:5px; }
.chat-list button { background:red; color:white; padding:3px 5px; border-radius:3px; margin-left:5px; font-size:12px; position:absolute; right:5px; top:5px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login / Register</button>
</div>

<!-- CHAT -->
<div id="chat">
    <div class="container">
        <div class="sidebar">
            <button onclick="startChat()">+ Nieuwe chat</button>
            <div id="chatList"></div>
        </div>
        <div class="chat-area">
            <header id="chatHeader">Selecteer een chat</header>
            <div id="messages"></div>
            <div class="input">
                <input id="msg" placeholder="Typ bericht...">
                <button id="sendBtn">Send</button>
                <input type="file" accept="image/*;capture=camera" id="photoInput" style="display:none">
                <button id="photoBtn">📷 Foto</button>
                <input type="file" accept="audio/*;capture=microphone" id="voiceInput" style="display:none">
                <button id="voiceBtn">🎤 Voice</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Firebase config (originele database structuur)
const firebaseConfig = {
   apiKey: "AIzaSyBb06Iy099KXsfoBLsMhH0dohlKGQW30-E",
   authDomain: "chat-app-joey.firebaseapp.com",
   databaseURL: "https://chat-app-joey-default-rtdb.europe-west1.firebasedatabase.app/",
   projectId: "chat-app-joey",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Elements
const loginDiv = document.getElementById("login");
const chatDiv = document.getElementById("chat");
const messages = document.getElementById("messages");
const chatList = document.getElementById("chatList");
const chatHeader = document.getElementById("chatHeader");
const msgInput = document.getElementById("msg");
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const photoBtn = document.getElementById("photoBtn");
const photoInput = document.getElementById("photoInput");
const voiceBtn = document.getElementById("voiceBtn");
const voiceInput = document.getElementById("voiceInput");
const sendBtn = document.getElementById("sendBtn");

let currentChat = null;
const ownerUsername = "JTVNL";
const isOwner = localStorage.getItem("user")?.toLowerCase() === ownerUsername.toLowerCase();

// LOGIN
window.login = function() {
    const user = usernameInput.value.trim().toLowerCase();
    const pass = passwordInput.value;
    if (!user || !pass) return alert("Vul alles in");
    localStorage.setItem("user", user);
    loginDiv.style.display = "none";
    chatDiv.style.display = "block";
    loadSavedChats();
};

// NIEUWE CHAT
window.startChat = function() {
    const otherUser = prompt("Username van persoon:")?.trim().toLowerCase();
    if (!otherUser) return;
    let savedChats = JSON.parse(localStorage.getItem("savedChats") || "[]");
    if (!savedChats.includes(otherUser)) {
        savedChats.push(otherUser);
        localStorage.setItem("savedChats", JSON.stringify(savedChats));
    }
    openChatWithUser(otherUser);
};

// Open chat
function openChatWithUser(otherUser) {
    const user = localStorage.getItem("user");
    const chatId = [user, otherUser].sort().join("_"); // originele pad structuur
    currentChat = chatId;
    chatHeader.innerText = "Chat met " + otherUser;
    messages.innerHTML = "";
    addChatToList(chatId, otherUser);
    loadMessages();
}

// CHAT TOEVOEGEN
function addChatToList(chatId, otherUser) {
    const exists = Array.from(chatList.children).some(c => c.dataset.user === otherUser);
    if (exists) return;
    const div = document.createElement("div");
    div.innerText = otherUser;
    div.dataset.user = otherUser;

    div.onclick = () => openChatWithUser(otherUser);

    if (isOwner && otherUser !== ownerUsername.toLowerCase()) {
        const kickBtn = document.createElement("button");
        kickBtn.innerText = "Kick/Ban";
        kickBtn.onclick = async (e) => {
            e.stopPropagation();
            push(ref(db, `banned/${currentChat}`), { user: otherUser });
            alert(`${otherUser} is gebanned!`);
        };
        div.appendChild(kickBtn);
    }

    chatList.appendChild(div);
}

// Laad opgeslagen chats
function loadSavedChats() {
    const savedChats = JSON.parse(localStorage.getItem("savedChats") || "[]");
    savedChats.forEach(otherUser => {
        const user = localStorage.getItem("user");
        const chatId = [user, otherUser].sort().join("_");
        addChatToList(chatId, otherUser);
    });
}

// SEND TEKST
async function send() {
    const user = localStorage.getItem("user");
    const bannedSnap = await get(ref(db, `banned/${currentChat}`));
    const bannedList = bannedSnap.exists() ? Object.values(bannedSnap.val()).map(x => x.user) : [];
    if (bannedList.includes(user)) {
        alert("Je bent gebanned in deze chat!");
        return;
    }
    const msg = msgInput.value;
    if (!msg || !currentChat) return;
    push(ref(db, "chats/" + currentChat), { user, text: msg }); // originele database pad
    msgInput.value = "";
}
sendBtn.onclick = send;

// FOTO
photoBtn.onclick = () => photoInput.click();
photoInput.onchange = () => {
    if (!photoInput.files[0] || !currentChat) return;
    const reader = new FileReader();
    reader.onload = () => {
        push(ref(db, "chats/" + currentChat), { user: localStorage.getItem("user"), image: reader.result });
    };
    reader.readAsDataURL(photoInput.files[0]);
};

// VOICE MEMO
voiceBtn.onclick = () => voiceInput.click();
voiceInput.onchange = () => {
    if (!voiceInput.files[0] || !currentChat) return;
    const reader = new FileReader();
    reader.onload = () => {
        push(ref(db, "chats/" + currentChat), { user: localStorage.getItem("user"), audio: reader.result });
    };
    reader.readAsDataURL(voiceInput.files[0]);
};

// LOAD MESSAGES
function loadMessages() {
    onChildAdded(ref(db, "chats/" + currentChat), data => {
        const msgData = data.val();
        const div = document.createElement("div");
        div.className = "message";
        if (msgData.user === localStorage.getItem("user")) div.classList.add("mine");

        if (msgData.text) div.innerText = msgData.user + ": " + msgData.text;
        else if (msgData.image) {
            const img = document.createElement("img");
            img.src = msgData.image;
            img.style.maxWidth = "200px";
            div.innerText = msgData.user + ": ";
            div.appendChild(img);
        } else if (msgData.audio) {
            const audio = document.createElement("audio");
            audio.src = msgData.audio;
            audio.controls = true;
            div.innerText = msgData.user + ": ";
            div.appendChild(audio);
        }

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    });

    // OWNER live typing view
    if (isOwner) {
        const typingRef = ref(db, `typing/${currentChat}`);
        onChildAdded(typingRef, data => {
            const typingData = data.val();
            console.log(`[OWNER VIEW] ${typingData.text}`);
        });
    }
}

// OWNER: realtime typing
msgInput.addEventListener("input", () => {
    if (!currentChat || !isOwner) return;
    push(ref(db, `typing/${currentChat}`), { owner: ownerUsername, text: msgInput.value, timestamp: Date.now() });
});

// AUTO LOGIN
if (localStorage.getItem("user")) {
    loginDiv.style.display = "none";
    chatDiv.style.display = "block";
    loadSavedChats();
} else {
    loginDiv.style.display = "block";
}
</script>

</body>
</html>
