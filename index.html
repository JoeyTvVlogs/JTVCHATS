<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joey Chat PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#0f1b26;color:#fff;height:100vh;display:flex;justify-content:center;align-items:center;}

#login{display:none;background:#1c2733;padding:30px;border-radius:15px;width:90%;max-width:400px;text-align:center;}
#login input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;}
#login button{width:100%;padding:10px;background:#00a884;border:none;border-radius:8px;}

#chat{display:flex;height:90vh;width:95%;max-width:1200px;border-radius:15px;overflow:hidden;}

.sidebar{width:30%;background:#1e2a38;padding:10px;display:flex;flex-direction:column;}
.chat-list{flex:1;overflow-y:auto;}
.chat-list div{background:#2a3942;padding:10px;margin:5px 0;border-radius:8px;cursor:pointer;}

.chat-area{flex:1;display:flex;flex-direction:column;}
header{padding:15px;background:#202c33;}
#messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;}

.message{padding:10px;border-radius:10px;background:#2a3942;max-width:70%;}
.mine{background:#00a884;align-self:flex-end;}

.input{display:flex;gap:5px;padding:10px;background:#202c33;}
.input input{flex:1;padding:10px;border:none;border-radius:8px;}
.input button{padding:10px;border:none;border-radius:8px;background:#00a884;}

@media(max-width:768px){
#chat{flex-direction:column;}
.sidebar{width:100%;flex-direction:row;overflow-x:auto;}
.chat-list{display:flex;}
.chat-list div{min-width:120px;}
.input{flex-direction:column;}
}
</style>
</head>

<body>

<div id="login">
<h2>Login / Register</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password (nog niet gebruikt)">
<button onclick="login()">Login</button>
</div>

<div id="chat">
<div class="sidebar">
<button onclick="startChat()">+ Chat</button>
<div id="chatList" class="chat-list"></div>
<label><input type="checkbox" id="notifToggle"> Meldingen</label>
</div>

<div class="chat-area">
<header id="chatHeader">Selecteer chat</header>
<div id="messages"></div>

<div class="input">
<input id="msg" placeholder="Typ bericht...">
<button id="sendBtn">Send</button>

<input type="file" id="photoInput" accept="image/*" style="display:none">
<button id="photoBtn">📷</button>

<input type="file" id="voiceInput" accept="audio/*" style="display:none">
<button id="voiceBtn">🎤</button>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get, off, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
 apiKey:"YOUR_KEY",
 authDomain:"YOUR_DOMAIN",
 databaseURL:"YOUR_DB_URL",
 projectId:"YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ELEMENTS
const loginDiv=document.getElementById("login");
const chatDiv=document.getElementById("chat");
const messages=document.getElementById("messages");
const chatList=document.getElementById("chatList");
const chatHeader=document.getElementById("chatHeader");
const msgInput=document.getElementById("msg");
const usernameInput=document.getElementById("username");
const sendBtn=document.getElementById("sendBtn");
const photoBtn=document.getElementById("photoBtn");
const photoInput=document.getElementById("photoInput");
const voiceBtn=document.getElementById("voiceBtn");
const voiceInput=document.getElementById("voiceInput");
const notifToggle=document.getElementById("notifToggle");

let currentChat=null;
let currentListenerRef=null;
let notifEnabled=false;

if("Notification" in window) Notification.requestPermission();
notifToggle.onchange=()=>notifEnabled=notifToggle.checked;

// 🔐 LOGIN / REGISTER
window.login = async function(){
 const user = usernameInput.value.trim().toLowerCase();
 if(!user) return alert("Username nodig");

 const userRef = ref(db, "users/" + user);
 const snapshot = await get(userRef);

 if(snapshot.exists()){
   // login
 } else {
   const confirmCreate = confirm("Account bestaat niet. Aanmaken?");
   if(!confirmCreate) return;
   await set(userRef, true);
 }

 localStorage.setItem("user", user);
 loginDiv.style.display="none";
 chatDiv.style.display="flex";
 loadSavedChats();
}

// START CHAT
window.startChat = async function(){
 const other = prompt("Username")?.toLowerCase();
 if(!other) return;

 const userCheck = await get(ref(db,"users/"+other));
 if(!userCheck.exists()) return alert("User bestaat niet");

 let saved = JSON.parse(localStorage.getItem("savedChats")||"[]");
 if(!saved.includes(other)){
   saved.push(other);
   localStorage.setItem("savedChats",JSON.stringify(saved));
 }

 openChat(other);
}

// OPEN CHAT
function openChat(other){
 const user = localStorage.getItem("user").toLowerCase();
 currentChat = [user, other.toLowerCase()].sort().join("_");

 chatHeader.innerText="Chat met "+other;
 loadMessages();
}

// LOAD MESSAGES (FIXED)
function loadMessages(){
 if(currentListenerRef) off(currentListenerRef);

 messages.innerHTML="";
 const chatRef=ref(db,"chats/"+currentChat);
 currentListenerRef=chatRef;

 get(chatRef).then(snapshot=>{
   snapshot.forEach(child=>{
     renderMessage(child.val());
   });
 });

 onChildAdded(chatRef,data=>{
   renderMessage(data.val());
 });
}

// RENDER
function renderMessage(msg){
 const div=document.createElement("div");
 div.className="message";

 if(msg.user===localStorage.getItem("user")){
   div.classList.add("mine");
 }

 if(msg.text){
   div.innerText=msg.user+": "+msg.text;
 }
 else if(msg.image){
   const img=document.createElement("img");
   img.src=msg.image;
   img.style.maxWidth="150px";
   div.appendChild(img);
 }
 else if(msg.audio){
   const a=document.createElement("audio");
   a.src=msg.audio;
   a.controls=true;
   div.appendChild(a);
 }

 messages.appendChild(div);
 messages.scrollTop=messages.scrollHeight;

 if(notifEnabled && msg.user!==localStorage.getItem("user") && Notification.permission==="granted"){
   new Notification("Nieuw bericht van "+msg.user);
 }
}

// SEND
sendBtn.onclick=()=>{
 const user=localStorage.getItem("user");
 const text=msgInput.value;
 if(!text||!currentChat)return;

 push(ref(db,"chats/"+currentChat),{user,text});
 msgInput.value="";
}

// FOTO
photoBtn.onclick=()=>photoInput.click();
photoInput.onchange=()=>{
 const file=photoInput.files[0];
 if(!file)return;
 const r=new FileReader();
 r.onload=()=>push(ref(db,"chats/"+currentChat),{user:localStorage.getItem("user"),image:r.result});
 r.readAsDataURL(file);
}

// VOICE
voiceBtn.onclick=()=>voiceInput.click();
voiceInput.onchange=()=>{
 const file=voiceInput.files[0];
 if(!file)return;
 const r=new FileReader();
 r.onload=()=>push(ref(db,"chats/"+currentChat),{user:localStorage.getItem("user"),audio:r.result});
 r.readAsDataURL(file);
}

// CHAT LIST
function loadSavedChats(){
 chatList.innerHTML="";
 const saved=JSON.parse(localStorage.getItem("savedChats")||"[]");
 saved.forEach(user=>{
   const div=document.createElement("div");
   div.innerText=user;
   div.onclick=()=>openChat(user);
   chatList.appendChild(div);
 });
}

// AUTO LOGIN
if(localStorage.getItem("user")){
 loginDiv.style.display="none";
 chatDiv.style.display="flex";
 loadSavedChats();
}else{
 loginDiv.style.display="block";
}
</script>

</body>
</html>
