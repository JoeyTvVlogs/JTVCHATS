<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joey Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b141a;
    color: white;
}

/* LOGIN */
#login {
    display: none;
    padding: 20px;
}

/* CHAT LAYOUT */
#chat {
    display: none;
    height: 100vh;
}

.container {
    display: flex;
    height: 100%;
}

/* SIDEBAR */
.sidebar {
    width: 30%;
    background: #202c33;
    padding: 10px;
}

.chat-list div {
    padding: 10px;
    background: #2a3942;
    margin: 5px 0;
    cursor: pointer;
}

/* CHAT AREA */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

header {
    background: #202c33;
    padding: 15px;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.message {
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
    background: #202c33;
    max-width: 60%;
}

.mine {
    background: #005c4b;
    margin-left: auto;
}

/* INPUT */
.input {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
}

button {
    padding: 10px;
    background: #00a884;
    border: none;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login / Register</button>
</div>

<!-- CHAT -->
<div id="chat">
    <div class="container">
        
        <!-- SIDEBAR -->
        <div class="sidebar">
            <button onclick="startChat()">+ Nieuwe chat</button>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <header id="chatHeader">Selecteer een chat</header>

            <div id="messages"></div>

            <div class="input">
                <input id="msg" placeholder="Typ bericht...">
                <button onclick="send()">Send</button>
            </div>
        </div>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 PLAK JOUW CONFIG HIER
const firebaseConfig = {
  apiKey: "AIzaSyBb06Iy099KXsfoBLsMhH0dohlKGQW30-E",
  authDomain: "chat-app-joey.firebaseapp.com",
  databaseURL: "https://chat-app-joey-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "chat-app-joey",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentChat = null;

// LOGIN
window.login = function() {
    const user = username.value;
    const pass = password.value;

    if (!user || !pass) return alert("Vul alles in");

    localStorage.setItem("user", user);

    login.style.display = "none";
    chat.style.display = "block";

    loadChats();
}

// NIEUWE CHAT
window.startChat = function() {
    const otherUser = prompt("Username van persoon:");

    if (!otherUser) return;

    const user = localStorage.getItem("user");

    const chatId = [user, otherUser].sort().join("_");

    currentChat = chatId;

    chatHeader.innerText = "Chat met " + otherUser;

    messages.innerHTML = "";

    addChatToList(chatId);

    loadMessages();
}

// CHAT TOEVOEGEN AAN LIJST
function addChatToList(chatId) {
    const div = document.createElement("div");

    const user = localStorage.getItem("user");
    const otherUser = chatId.replace(user + "_", "").replace("_" + user, "");

    div.innerText = otherUser;

    div.onclick = () => {
        currentChat = chatId;
        chatHeader.innerText = "Chat met " + otherUser;
        messages.innerHTML = "";
        loadMessages();
    };

    chatList.appendChild(div);
}

// BERICHT STUREN
window.send = function() {
    const msgText = msg.value;
    const user = localStorage.getItem("user");

    if (!msgText || !currentChat) return;

    push(ref(db, "chats/" + currentChat), {
        user: user,
        text: msgText
    });

    msg.value = "";
}

// BERICHTEN LADEN
function loadMessages() {
    onChildAdded(ref(db, "chats/" + currentChat), data => {
        const msgData = data.val();

        const div = document.createElement("div");
        div.className = "message";

        if (msgData.user === localStorage.getItem("user")) {
            div.classList.add("mine");
        }

        div.innerText = msgData.user + ": " + msgData.text;

        messages.appendChild(div);
    });
}

// AUTO LOGIN
if (localStorage.getItem("user")) {
    login.style.display = "none";
    chat.style.display = "block";
    loadChats();
} else {
    login.style.display = "block";
}

// LOAD CHATS (basic)
function loadChats() {
    // simpel: nog geen opslag, komt in v2
}
</script>

</body>
</html>
