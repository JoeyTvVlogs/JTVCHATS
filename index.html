<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="chat">
  <div class="sidebar">
    <button onclick="startChat()">+ Chat</button>
    <div id="chatList"></div>
  </div>

  <div class="chat-area">
    <header id="chatHeader"></header>
    <div id="messages"></div>

    <div class="input">
      <input id="msg">
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<script type="module" src="js/chat.js"></script>
</body>
</html>
